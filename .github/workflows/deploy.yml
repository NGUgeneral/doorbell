name: Deploy Tracking Engine & Sync DB Matrix

on:
  push:
    branches: [ main ]
    paths: [ 'supabase/**' ]
  schedule:
    - cron: '0 0 * * 3' # Automated weekly dataset sync (Every Wednesday at Midnight UTC)
  workflow_dispatch:

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Supabase CLI Tooling
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Deno Runtime Environment
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # 1. Validate application stability via unit and integration tests
      - name: Run Test Suite
        run: |
          deno test --allow-env --allow-net --no-lock --config supabase/functions/doorbell/deno.json supabase/functions/doorbell/test_index.ts
        env:
          SUPABASE_URL: "http://localhost"
          SUPABASE_SERVICE_ROLE_KEY: "mock"
          SUPABASE_DB_URL: "postgresql://mock"

      # 2. Deploy doorbell edge function code to the Supabase Edge Runtime environment
      - name: Deploy Tracker Code to Edge Runtime
        run: |
          supabase functions deploy doorbell --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 3. Hydrate the PostgreSQL subnet lookups with the latest data
      - name: Refresh PostgreSQL Subnet Lookups
        run: |
          # Fetch the up-to-date CSV dataset from the official SAPICS IP Location DB repository
          curl -L -o user-country.csv "https://github.com/sapics/ip-location-db/releases/download/latest/user-country-ipv4-cidr.csv"
          
          # Link to your project explicitly using the CLI management API
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Clear out the stale database records
          supabase db query --linked "TRUNCATE TABLE public.geoip_country_blocks;"
          
          # Split the file into manageable 50k-line chunks to respect the CLI's request size limits
          split -l 50000 user-country.csv chunk_ --additional-suffix=.csv

          for chunk in chunk_*.csv; do
            echo "Processing $chunk..."
            echo "INSERT INTO public.geoip_country_blocks (network, country_code) VALUES" > upload_chunk.sql
            awk -F',' 'length($2) == 2 {print "('\''" $1 "'\'', '\''" $2 "'\''),"}' "$chunk" >> upload_chunk.sql
            
            # Replace the final trailing comma with a terminating semicolon to complete the query safely
            sed -i '$ s/),$/);/' upload_chunk.sql

            supabase db query --linked --file upload_chunk.sql
          done

          rm -f chunk_*.csv upload_chunk.sql user-country.csv
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}